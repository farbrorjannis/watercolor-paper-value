<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akvarellskiss Paper Value Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f3ef;
  margin: 0;
  padding: 20px;
  color: #1f1f1f;
}

h1 { font-size: 22px; margin-bottom: 10px; }

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.small { font-size: 12px; opacity: 0.7; }

input, button {
  padding: 6px;
  margin: 4px;
}
button {
  cursor: pointer;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Akvarellskiss Paper Value Tool</h1>

<div class="card">
  <strong>Stores (default)</strong>
  <div class="small">
    IB Wahlström · Kreatima · KCK · Jordi (Stockholm)
  </div>
</div>

<div class="card">
  <strong>Add your store</strong><br/>
  <input id="name" placeholder="Name"/>
  <input id="city" placeholder="City"/>
  <input id="country" placeholder="Country"/>
  <input id="currency" placeholder="Currency"/>
  <button onclick="addStore()">Add</button>
</div>

<div id="stores" class="card"></div>

<h2>Offers</h2>
<div id="offers"></div>

<script>
const A4 = 210 * 297;

let stores = [
  {id:"ib",name:"IB Wahlström",city:"Stockholm",country:"SE",currency:"SEK"},
  {id:"kreatima",name:"Kreatima",city:"Stockholm",country:"SE",currency:"SEK"},
  {id:"kck",name:"KCK",city:"Stockholm",country:"SE",currency:"SEK"},
  {id:"jordi",name:"Jordi",city:"Stockholm",country:"SE",currency:"SEK"}
];

let offers = [
  {
    name:"Arches Cold Press Block",
    storeId:"kreatima",
    w:300,h:400,
    sheets:20,
    price:899,
    eff:0.95
  },
  {
    name:"Canson XL Pad",
    storeId:"ib",
    w:210,h:297,
    sheets:30,
    price:249,
    eff:0.95
  }
];

function calc(o){
  let area = o.w * o.h;
  let total = area * o.sheets * o.eff;
  let a4 = total / A4;
  return {
    a4: a4,
    perA4: o.price / a4
  };
}

function renderStores(){
  let el = document.getElementById("stores");
  el.innerHTML = "<strong>Stores</strong><br>";
  stores.forEach(s=>{
    el.innerHTML += `<div>${s.name} (${s.city})</div>`;
  });
}

function renderOffers(){
  let el = document.getElementById("offers");
  el.innerHTML = "";
  
  offers.forEach(o=>{
    let s = stores.find(x=>x.id===o.storeId);
    let c = calc(o);

    el.innerHTML += `
      <div class="card">
        <strong>${o.name}</strong><br/>
        <div class="small">${s.name}</div>
        Price: ${o.price} ${s.currency}<br/>
        A4 units: ${c.a4.toFixed(2)}<br/>
        <strong>Price per A4: ${c.perA4.toFixed(2)}</strong>
      </div>
    `;
  });
}

function addStore(){
  let s = {
    id: document.getElementById("name").value.toLowerCase(),
    name: document.getElementById("name").value,
    city: document.getElementById("city").value,
    country: document.getElementById("country").value,
    currency: document.getElementById("currency").value
  };
  stores.push(s);
  renderStores();
}

renderStores();
renderOffers();
</script>

</body>
</html>
