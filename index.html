<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Watercolor Value Tool</title>

<style>
body{font-family:Arial;margin:0;background:#f6f3ef}
header{padding:16px;background:white}
.container{max-width:900px;margin:auto;padding:16px}
.card{background:white;padding:12px;margin:10px 0;border-radius:10px}
select{width:100%;padding:8px;margin:5px 0}
</style>
</head>

<body>

<header>
<h2>Watercolor Paper Value Tool</h2>
</header>

<div class="container">

<div class="card">
<select id="store"></select>
<select id="material">
<option value="all">All material</option>
<option value="cotton">Cotton</option>
<option value="cellulose">Cellulose</option>
</select>
</div>

<div id="out"></div>

</div>

<script>

const A4 = 210*297;

let stores=[],products=[],offers=[];

Promise.all([
fetch("stores.json").then(r=>r.json()),
fetch("products.json").then(r=>r.json()),
fetch("offers.json").then(r=>r.json())
]).then(d=>{
stores=d[0];products=d[1];offers=d[2];
init();
render();
});

function init(){
const s=document.getElementById("store");
s.innerHTML='<option value="all">All stores</option>';
stores.forEach(x=>{
s.innerHTML+=`<option value="${x.id}">${x.name}</option>`;
});
s.onchange=render;
document.getElementById("material").onchange=render;
}

function calc(o){
const area=o.width*o.height;
const total=area*o.sheets*o.efficiency;
const a4=total/A4;
return {...o,a4,pp:a4?o.price/a4:999999};
}

function render(){
let m=document.getElementById("material").value;
let st=document.getElementById("store").value;

let data=offers.map(o=>{
let p=products.find(x=>x.id===o.productId);
let s=stores.find(x=>x.id===o.storeId);
return {...calc(o),product:p,store:s};
})
.filter(d=>m==="all"||d.product.material===m)
.filter(d=>st==="all"||d.storeId===st);

document.getElementById("out").innerHTML=
data.map(d=>`
<div class="card">
<b>${d.product.brand} ${d.product.name}</b><br/>
${d.store.name}<br/>
${d.pp.toFixed(2)} per A4
</div>
`).join("");
}

</script>

</body>
</html>
