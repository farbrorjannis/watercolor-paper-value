<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akvarellskiss – Paper Value Tool</title>

<style>

/* 🎨 AKVARELLSKISS BRAND PALETTE */
:root{
--paper:#f6f3ef;
--card:#ffffff;
--ink:#1f1f1f;
--muted:#6b625a;
--clay:#c8b6a6;
--accent:#6c8f7d;
--soft:#e7ded4;
}

body{
margin:0;
font-family: system-ui, -apple-system, Arial;
background:var(--paper);
color:var(--ink);
}

header{
background:var(--card);
padding:22px;
border-bottom:1px solid var(--soft);
}

h1{
margin:0;
font-size:18px;
letter-spacing:.3px;
}

small{color:var(--muted)}

.container{
max-width:980px;
margin:auto;
padding:18px;
}

.card{
background:var(--card);
padding:14px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
border:1px solid var(--soft);
}

select,input{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid var(--soft);
border-radius:10px;
background:#fff;
}

button{
background:var(--ink);
color:#fff;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.badge{
font-size:11px;
padding:4px 8px;
border-radius:999px;
margin-left:6px;
display:inline-block;
}

.best{background:var(--accent);color:#fff}
.smart{background:var(--clay);color:#1f1f1f}
.studio{background:var(--soft);color:#1f1f1f}

.item{
padding:12px 0;
border-bottom:1px solid var(--soft);
}

.price{
font-size:16px;
margin-top:4px;
}

.meta{
color:var(--muted);
font-size:13px;
}

.brandline{
display:flex;
align-items:center;
gap:6px;
}

footer{
text-align:center;
padding:30px;
color:var(--muted);
font-size:12px;
}

</style>
</head>

<body>

<header>
<h1>Akvarellskiss Paper Value Tool</h1>
<small>www.akvarellskiss.se · watercolor paper intelligence</small>
</header>

<div class="container">

<div class="card">
<select id="store"></select>

<select id="material">
<option value="all">All papers</option>
<option value="cotton">Cotton</option>
<option value="cellulose">Cellulose</option>
</select>
</div>

<div class="card">
<h3>Add your store</h3>

<input id="name" placeholder="Store name">
<input id="city" placeholder="City">
<input id="country" placeholder="Country">
<input id="currency" placeholder="Currency (SEK/USD/EUR/GBP)">

<button onclick="addStore()">Add Store</button>
</div>

<div id="out"></div>

</div>

<footer>
Akvarellskiss · tools for artists who think in cost per sheet, not price per block
</footer>

<script>

const A4 = 210*297;

let stores=[],products=[],offers=[];

/* LOAD DATA */
Promise.all([
fetch("stores.json").then(r=>r.json()),
fetch("products.json").then(r=>r.json()),
fetch("offers.json").then(r=>r.json())
]).then(d=>{
stores=d[0];
products=d[1];
offers=d[2];

let saved=JSON.parse(localStorage.getItem("userStores")||"[]");
stores=stores.concat(saved);

init();
render();
});

function init(){
const s=document.getElementById("store");
s.innerHTML='<option value="all">All stores</option>';

stores.forEach(x=>{
s.innerHTML+=`<option value="${x.id}">${x.name}</option>`;
});

s.onchange=render;
material.onchange=render;
}

function addStore(){

const name=document.getElementById("name").value.trim();
if(!name) return;

const s={
id:name.toLowerCase().replace(/\s+/g,"_"),
name,
city:city.value,
country:country.value,
currency:currency.value
};

let saved=JSON.parse(localStorage.getItem("userStores")||"[]");
saved.push(s);

localStorage.setItem("userStores",JSON.stringify(saved));

stores.push(s);

init();
render();
}

function calc(o){
const area=o.width*o.height;
const total=area*o.sheets*o.efficiency;
const a4=total/A4;
return {...o,pp:o.price/a4};
}

function badge(i){
if(i===0) return '<span class="badge best">Best Deal</span>';
if(i<3) return '<span class="badge smart">Smart Choice</span>';
return '<span class="badge studio">Studio</span>';
}

function render(){

const m=material.value;
const st=store.value;

let data=offers.map(o=>{
let p=products.find(x=>x.id===o.productId);
let s=stores.find(x=>x.id===o.storeId);
return {...calc(o),product:p,store:s};
})
.filter(d=>m==="all"||d.product.material===m)
.filter(d=>st==="all"||d.storeId===st)
.sort((a,b)=>a.pp-b.pp);

out.innerHTML=data.map((d,i)=>`
<div class="card">

<div class="brandline">
<b>${d.product.brand} ${d.product.name}</b>
${badge(i)}
</div>

<div class="meta">${d.store.name} · ${d.store.city}</div>

<div class="price">
<b>${d.pp.toFixed(2)}</b> per A4
</div>

</div>
`).join("");

}

</script>

</body>
</html>
